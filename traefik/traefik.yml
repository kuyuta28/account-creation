# Static configuration
#
# Dashboard control:
#   - Dev: traefik command includes `--api.insecure=true` and compose binds 127.0.0.1:8080
#   - Prod: docker-compose.prod.yml drops both, so the dashboard is unreachable.
#   To fully remove the API even in dev, edit docker-compose.yml and remove
#   the `--api.insecure=true` arg from traefik.command.
api:
  insecure: true
  dashboard: true

entryPoints:
  web:
    address: ":80"

log:
  level: INFO   # DEBUG in dev override via env if needed

accessLog:
  format: common
  filters:
    statusCodes:
      - "100-599"
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop

providers:
  file:
    filename: /etc/traefik/traefik.yml
    watch: true

# Dynamic configuration
http:
  middlewares:
    # Strip /<service> prefix before forwarding to backend.
    strip-mail:
      stripPrefix:
        prefixes:
          - "/mail"
    strip-tts:
      stripPrefix:
        prefixes:
          - "/tts"
    strip-aa:
      stripPrefix:
        prefixes:
          - "/aa"

    # Public rate limit: 100 req/s average, 50 burst. Anything above returns 429.
    # Tight enough to slow brute-force, loose enough to not break the desktop UI.
    rate-limit-public:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 0   # trust the closest proxy / direct peer

    # Stricter limit on /api/* because registration endpoints are expensive.
    rate-limit-api:
      rateLimit:
        average: 20
        burst: 10
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 0

    # Retry idempotent calls once. Traefik v3 only takes attempts + initialInterval;
    # it retries on 5xx and network errors automatically.
    retry-safe:
      retry:
        attempts: 2
        initialInterval: 200ms

  routers:
    mail:
      rule: "PathPrefix(`/mail/`)"
      priority: 50
      service: mail-service
      middlewares:
        - strip-mail
        - rate-limit-public
        - retry-safe
    tts:
      rule: "PathPrefix(`/tts/`)"
      priority: 50
      service: tts-proxy
      middlewares:
        - strip-tts
        - rate-limit-public
        - retry-safe
    aa:
      rule: "PathPrefix(`/aa/`)"
      priority: 50
      service: aa-proxy
      middlewares:
        - strip-aa
        - rate-limit-public
        - retry-safe
    web-ui:
      rule: "PathPrefix(`/`)"
      priority: 1
      service: web-ui
      middlewares:
        - rate-limit-public
        - retry-safe

    api:
      rule: "PathPrefix(`/api/v1`)"
      priority: 100
      service: registrar
      middlewares:
        - rate-limit-api
        - retry-safe

  services:
    mail-service:
      loadBalancer:
        servers:
          - url: "http://mail-service:8701"
    tts-proxy:
      loadBalancer:
        servers:
          - url: "http://tts-proxy:8700"
    aa-proxy:
      loadBalancer:
        servers:
          - url: "http://aa-proxy:8702"
    web-ui:
      loadBalancer:
        servers:
          - url: "http://web-ui:80"

    registrar:
      loadBalancer:
        servers:
          - url: "http://registrar:8709"


