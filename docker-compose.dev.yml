# Dev overlay: bind-mount source code, disable auto-restart, expose Vite HMR.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Optional GUI debug for registrar (Windows host + Docker Desktop/WSL2):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up registrar
# Requires a local X server (VcXsrv/MobaXterm) and host firewall allow.

services:
  registrar:
    volumes:
      - ./registrar/src:/app/src
      - ./registrar/main.py:/app/main.py
      - ./registrar/run_api.py:/app/run_api.py
      - ./common/src:/app/common/src
      - ./registrar/config:/app/config:ro
      # Camoufox cache from host; override to :rw if the service must write profiles.
      - ${LOCALAPPDATA_POSIX:-/c/Users/admin/AppData/Local}/camoufox:/app/.cache/camoufox:ro
      # GUI debug only: forward host X11 socket. Unset CAMOUFOX_HEADLESS in config.yaml to use.
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      DISPLAY: host.docker.internal:0
      CAMOUFOX_HEADLESS: "0"
    restart: "no"

  mail-service:
    volumes:
      - ./mail-service/src:/app/src
      - ./mail-service/main.py:/app/main.py
      - ./common/src:/app/common/src
      - ./mail-service/config:/app/config:ro
      - ${LOCALAPPDATA_POSIX:-/c/Users/admin/AppData/Local}/camoufox:/app/.cache/camoufox:ro
    restart: "no"

  aa-proxy:
    volumes:
      - ./aa-proxy/src:/app/src
      - ./aa-proxy/main.py:/app/main.py
      - ./common/src:/app/common/src
      - ./aa-proxy/config:/app/config:ro
      - ${LOCALAPPDATA_POSIX:-/c/Users/admin/AppData/Local}/camoufox:/app/.cache/camoufox:ro
    restart: "no"

  tts-proxy:
    volumes:
      - ./tts-proxy/src:/app/src
      - ./tts-proxy/main.py:/app/main.py
      - ./common/src:/app/common/src
      - ./tts-proxy/config:/app/config:ro
      - ${NINE_ROUTER_HOST_DIR:-/c/Users/admin/AppData/Roaming/9router}:/mnt/9router:ro
    environment:
      NINE_ROUTER_DB: /mnt/9router/db/data.sqlite
    restart: "no"

  web-ui:
    build: !reset null
    image: node:20-alpine
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    working_dir: /app
    command: ["sh", "-c", "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 80"]
    volumes:
      - ./web-ui:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:1421:80"
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_TTS_BASE_URL: /tts
    restart: "no"
    depends_on:
      - registrar
      - mail-service
      - aa-proxy
      - tts-proxy