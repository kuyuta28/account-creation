# Loki single-binary, filesystem-backed, 14-day retention.
# Local single-host setup. For multi-node see Loki distributed mode (not needed here).

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        period: 24h
        prefix: index_

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
  filesystem:
    directory: /loki/chunks

limits_config:
  retention_period: 336h                # 14 days. Not retroactive — only newly ingested logs.
  max_global_streams_per_user: 5000     # cardinality guard
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true

compactor:
  working_directory: /loki/retention
  compaction_interval: 10m
  retention_enabled: true               # REQUIRED — without it compactor only compacts, never deletes.
  retention_delete_delay: 2h
  retention_delete_worker_count: 50
  delete_request_store: filesystem      # mandatory when retention is on
