networks:
  account-net:
    name: account-net
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - SYS_RESOURCE
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 200
    shm_size: 256m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-account_creator}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccs_dev_only}
      POSTGRES_USER: ${POSTGRES_USER:-ccs}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccs} -d ${POSTGRES_DB:-account_creator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: &x-logging
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - account-net
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  traefik:
    image: traefik:v3.0
    container_name: traefik
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 200
    logging: *x-logging
    networks:
      - account-net
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    depends_on:
      postgres:
        condition: service_healthy

  aa-proxy:
    build:
      context: .
      dockerfile: aa-proxy/Dockerfile
    container_name: aa-proxy
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 2g
    pids_limit: 200
    logging: *x-logging
    tmpfs:
      - /tmp:size=256m,mode=1777
    networks:
      - account-net
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      SENTRY_DSN: ${SENTRY_DSN:-}
      AA_PORT: 8702
      DATABASE_URL: ${DATABASE_URL}
      HOST_BROWSER_AGENT_URL: ${HOST_BROWSER_AGENT_URL:-http://host.docker.internal:9999}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8702/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./aa-proxy/logs:/app/logs
      - ./aa-proxy/config:/app/config:ro
      - ./aa-proxy/data:/app/data
      - ${LOCALAPPDATA_POSIX:-/c/Users/admin/AppData/Local}/camoufox:/app/.cache/camoufox:rw

  mail-service:
    build:
      context: .
      dockerfile: mail-service/Dockerfile
    container_name: mail-service
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 2g
    pids_limit: 200
    logging: *x-logging
    tmpfs:
      - /tmp:size=256m,mode=1777
    networks:
      - account-net
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      SENTRY_DSN: ${SENTRY_DSN:-}
      MAIL_PORT: 8701
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8701/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mail-service-data:/app/data
      - ./mail-service/logs:/app/logs
      - ./mail-service/config:/app/config:ro
      - ${LOCALAPPDATA_POSIX:-/c/Users/admin/AppData/Local}/camoufox:/app/.cache/camoufox:rw

  registrar:
    build:
      context: .
      dockerfile: registrar/Dockerfile
    container_name: registrar
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 3g
    pids_limit: 300
    logging: *x-logging
    tmpfs:
      - /tmp:size=2g,mode=1777
    networks:
      - account-net
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      SENTRY_DSN: ${SENTRY_DSN:-}
      REGISTRAR_HOST: 0.0.0.0
      REGISTRAR_PORT: 8709
      DATABASE_URL: ${DATABASE_URL}
      HOST_BROWSER_AGENT_URL: ${HOST_BROWSER_AGENT_URL:-http://host.docker.internal:9999}
      NINEROUTER_PASSWORD: ${NINEROUTER_PASSWORD:-}
      TWOCAPTCHA_API_KEY: ${TWOCAPTCHA_API_KEY:-}
      # ponytail: headless is enforced via config in container. Use dev overlay for GUI debug on Windows.
      CAMOUFOX_HEADLESS: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8709/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./registrar/data:/app/data
      - ./registrar/logs:/app/logs
      - ./registrar/debug:/app/debug
      - ./registrar/screenshots:/app/screenshots
      - ./registrar/config:/app/config
      - ${LOCALAPPDATA_POSIX:-/c/Users/admin/AppData/Local}/camoufox:/app/.cache/camoufox:rw

  tts-proxy:
    build:
      context: .
      dockerfile: tts-proxy/Dockerfile
    container_name: tts-proxy
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 100
    logging: *x-logging
    tmpfs:
      - /tmp:size=128m,mode=1777
    networks:
      - account-net
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TTS_PORT: 8700
      DATABASE_URL: ${DATABASE_URL}
      NINE_ROUTER_DB: /home/app/.local/share/9router/db/data.sqlite
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8700/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./tts-proxy/logs:/app/logs
      - ./tts-proxy/config:/app/config:ro
      - ${APPDATA_POSIX:-/c/Users/admin/AppData/Roaming}/9router/db:/home/app/.local/share/9router/db:ro

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: web-ui
    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 100
    logging: *x-logging
    networks:
      - account-net
    depends_on:
      registrar:
        condition: service_healthy
      mail-service:
        condition: service_healthy
      aa-proxy:
        condition: service_healthy
      tts-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      SENTRY_DSN: ${SENTRY_DSN:-}

volumes:
  mail-service-data:
  postgres_data:
