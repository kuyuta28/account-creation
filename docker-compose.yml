# Root orchestration: dev/staging local
# For prod/staging release use docker-compose.{prod,staging}.yml

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-common-security: &default-security
  security_opt:
    - no-new-privileges:true
  read_only: false   # services write to /app/{data,logs,debug,screenshots} and /tmp; tmpfs handles /tmp
  restart: unless-stopped
  logging: *default-logging

services:
  postgres:
    image: postgres:16-alpine
    container_name: ccs-postgres
    environment:
      POSTGRES_USER: ccs
      POSTGRES_PASSWORD: ccs_secret
      POSTGRES_DB: account_creator
    # Postgres is reachable from host for local tooling (psql, migrations).
    # For prod/staging override with ports: !reset [] in prod overlay.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - account-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccs -d account_creator"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging: *default-logging
    # Postgres needs writable data dir; cannot use read_only:true.
    # Mitigate with no-new-privileges + drop capabilities + pids/mem limits.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    pids_limit: 200
    mem_limit: 1g
    shm_size: 256m

  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/traefik.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - account-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 200
    mem_limit: 256m

  registrar:
    build:
      context: .
      dockerfile: registrar/Dockerfile
    container_name: registrar
    environment:
      - REGISTRAR_HOST=0.0.0.0
      - REGISTRAR_PORT=8709
      - APP_ENV=prod
      - DATABASE_URL=postgresql+asyncpg://ccs:ccs_secret@postgres:5432/account_creator
    ports:
      - "127.0.0.1:8709:8709"
    volumes:
      - ./registrar/data:/app/data
      - ./registrar/logs:/app/logs
      - ./registrar/debug:/app/debug
      - ./registrar/screenshots:/app/screenshots
      - ./registrar/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - account-net
    <<: *default-security
    pids_limit: 300
    mem_limit: 3g
    # browsers need writable HOME, /tmp; tmpfs for /tmp
    tmpfs:
      - /tmp:size=512m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8709/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  mail-service:
    build:
      context: .
      dockerfile: mail-service/Dockerfile
    container_name: mail-service
    environment:
      - MAIL_PORT=8701
      - DATABASE_URL=postgresql+asyncpg://ccs:ccs_secret@postgres:5432/account_creator
    ports:
      - "127.0.0.1:8701:8701"
    volumes:
      - ./mail-service/logs:/app/logs
      - ./mail-service/data:/app/data
      - ./mail-service/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - account-net
    <<: *default-security
    pids_limit: 200
    mem_limit: 2g
    tmpfs:
      - /tmp:size=256m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8701/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  aa-proxy:
    build:
      context: .
      dockerfile: aa-proxy/Dockerfile
    container_name: aa-proxy
    environment:
      - AA_PORT=8702
      - DATABASE_URL=postgresql+asyncpg://ccs:ccs_secret@postgres:5432/account_creator
    ports:
      - "127.0.0.1:8702:8702"
    volumes:
      - ./aa-proxy/logs:/app/logs
      - ./aa-proxy/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - account-net
    <<: *default-security
    pids_limit: 200
    mem_limit: 2g
    tmpfs:
      - /tmp:size=256m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8702/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  tts-proxy:
    build:
      context: .
      dockerfile: tts-proxy/Dockerfile
    container_name: tts-proxy
    environment:
      - TTS_PORT=8700
      - DATABASE_URL=postgresql+asyncpg://ccs:ccs_secret@postgres:5432/account_creator
    ports:
      - "127.0.0.1:8700:8700"
    volumes:
      - ./tts-proxy/logs:/app/logs
      - ./tts-proxy/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - account-net
    <<: *default-security
    pids_limit: 100
    mem_limit: 512m
    tmpfs:
      - /tmp:size=128m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8700/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:

networks:
  account-net:
    name: account-net
    driver: bridge
