name: Platform Orchestration Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  orchestration-repo-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --upgrade pip pyyaml
      - name: Validate root runtime truth
        run: python .github/scripts/validate_runtime_truth.py
      - name: Verify orchestration ownership docs exist
        run: |
          test -f README.md
          test -f docs/ROOT-REPO.md
          test -f docs/ARCHITECTURE.md
          test -f docs/API-ARCHITECTURE.md
          test -f docs/TESTING.md
          test -f docs/superpowers/contracts/internal-api.md
      - name: Verify operational runbooks exist
        run: |
          test -f docs/superpowers/runbooks/backup-restore-drill.md
          test -f docs/superpowers/runbooks/release-promotion-drill.md
          test -f docs/superpowers/runbooks/incident-response.md
