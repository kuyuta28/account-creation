name: Docs Consistency

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  runtime-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --upgrade pip pyyaml
      - name: Validate compose and docs runtime truth
        run: python .github/scripts/validate_runtime_truth.py
