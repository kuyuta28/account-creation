# Observability overlay — Prometheus + Grafana. Optional; activate via:
#   pwsh scripts/docker-up.ps1   (auto-appends if docker-compose.observability.yml exists)
#
# Required env for non-default credentials:
#   GRAFANA_ADMIN_USER    (default: admin)
#   GRAFANA_ADMIN_PASSWORD (REQUIRED in prod; the default "admin" only exists to ease first-login)
#
# IMPORTANT: never commit a real password. Either pass via env / secret manager,
# or mount /etc/grafana/grafana.ini from a host file (also secret-managed).

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - account-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - account-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false   # Grafana needs to write its sqlite db
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Central logging: Loki + Alloy ──────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.1
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - account-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false   # Loki writes index/chunks
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  alloy:
    image: grafana/alloy:v1.17.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      # ONLY the socket — NOT /var/lib/docker/containers (unreachable on Docker Desktop/WSL2).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    networks:
      - account-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /data-alloy:size=64m,mode=1777   # Alloy writes its state store here
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 100
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
